name: Master pipeline
on:
#  push:
#    branches:
#      - master
#      - dev

  workflow_dispatch:
    inputs:
      environments:
        description: "Choose environment"
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  call-build-workflow:
    uses: ./.github/workflows/build-workflow.yaml

  call-deploy-dev-workflow:
    needs: call-build-workflow
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'workflow_dispatch' && inputs.environments == 'dev')
    uses: ./.github/workflows/deploy-dev-workflow.yaml

  call-deploy-prod-workflow:
    needs: call-build-workflow
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && inputs.environments == 'prod')
    uses: ./.github/workflows/deploy-prod-workflow.yaml