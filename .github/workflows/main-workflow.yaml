name: CI/CD Pipeline for Alert-Depend Alarm

on:
  workflow_dispatch:
#  push:
#    branches:
#      - master

# I'll add more triggers here
jobs:
    # TODO: finish all stages
  build-edge-service:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      
      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build JARs
        working-directory: edge-service
        run: |
          chmod +x ./gradlew
          ./gradlew clean build jar -x test
          
      - name: Complex login, build and push
        uses: ./.github/actions/login-push
        with:
          service: edge-service
          token: ${{ secrets.GITHUB_TOKEN }}

  build-alert-watcher:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6

      - name: Complex login, build and push
        uses: ./.github/actions/login-push
        with:
          service: alert-watcher
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-alert-watcher, build-edge-service]
    steps:
      - name: Get Code
      - uses: actions/checkout@v6

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_KEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.TAILSCALE_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Create .env file
        run: |
          cat << EOF > .env
          APP_KEY=${{ secrets.APP_KEY }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_TO=${{ secrets.SMTP_TO }}
          WATCHER_ALERTS_API_KEY=${{ secrets.WATCHER_ALERTS_API_KEY }}
          WATCHER_WEBHOOK_KEY=${{ secrets.WATCHER_WEBHOOK_KEY }}
          PORT_STARTER=8080
          WATCHER_PORT=5001
          HOST_STARTER=0.0.0.0
          WATCHER_HOST=0.0.0.0
          
